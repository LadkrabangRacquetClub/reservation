<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <title>กำลังโหลด...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    
    .logo {
      font-size: 4em;
      margin-bottom: 20px;
    }
    
    .title {
      font-size: 1.5em;
      margin-bottom: 10px;
      font-weight: 600;
    }
    
    .subtitle {
      font-size: 1em;
      margin-bottom: 30px;
      opacity: 0.8;
    }
    
    .loading {
      margin: 20px 0;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .manual-link {
      margin-top: 20px;
    }
    
    .manual-link a {
      color: white;
      text-decoration: none;
      padding: 12px 24px;
      border: 2px solid white;
      border-radius: 25px;
      display: inline-block;
      transition: all 0.3s ease;
    }
    
    .manual-link a:hover {
      background: white;
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="logo">🏓</div>
  <div class="title">Ladkrabang Racquet Club</div>
  <div class="subtitle">ระบบจองสนาม</div>
  
  <div class="loading">
    <div class="spinner"></div>
    <div>กำลังเปลี่ยนเส้นทาง...</div>
  </div>
  
  <div class="manual-link">
    <a href="https://script.google.com/macros/s/AKfycbyo5WRy7iyJi6kThj5z_m3XyzO6yDZ4hhtH5Tsutwz6m99-pY-wY3BVcF_vSrFjT1hq/exec" id="manual-link">
      คลิกที่นี่หากไม่เปลี่ยนเส้นทางอัตโนมัติ
    </a>
  </div>

  <script>
    // Auto redirect ไปยัง Google Apps Script โดยตรง
    const targetUrl = "https://script.google.com/macros/s/AKfycbyo5WRy7iyJi6kThj5z_m3XyzO6yDZ4hhtH5Tsutwz6m99-pY-wY3BVcF_vSrFjT1hq/exec";
    
    // หน่วงเวลาเล็กน้อยแล้ว redirect
    setTimeout(() => {
      window.location.replace(targetUrl);
    }, 2000);
    
    // Fallback: redirect ทันทีเมื่อคลิก
    document.getElementById('manual-link').addEventListener('click', (e) => {
      e.preventDefault();
      window.location.replace(targetUrl);
    });
    
    // เพิ่ม meta refresh เป็น backup
    setTimeout(() => {
      const meta = document.createElement('meta');
      meta.httpEquiv = 'refresh';
      meta.content = '3;url=' + targetUrl;
      document.head.appendChild(meta);
    }, 1000);
  </script>
</body>
</html>
