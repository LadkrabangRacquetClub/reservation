<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <title>จองสนาม</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { width:100%; height:100%; overflow:hidden; }
    iframe { width:100%; height:100%; border:0; display:block; }
  </style>
</head>
<body>
  <iframe 
    src="https://script.google.com/macros/s/AKfycbxETsJxIbaYYlilT33fKX9egNaigbe82QgziXgvf73mRIGGRPopszeA8v9CgbF4lRNcgw/exec?embedded=true&source=github"
    seamless="seamless"
    allowtransparency="true"
    frameborder="0"
    scrolling="yes"
    allowfullscreen>
  </iframe>

  <script>
    // รับ message จาก iframe เพื่อปรับแต่ง
    window.addEventListener('message', function(event) {
      if (event.origin !== 'https://script.google.com') return;
      
      // จัดการ message จาก Google Apps Script
      if (event.data.type === 'resize') {
        const iframe = document.querySelector('iframe');
        if (event.data.height) {
          iframe.style.height = event.data.height + 'px';
        }
      }
    });
    
    // ส่ง message ไปยัง iframe
    window.addEventListener('load', function() {
      const iframe = document.querySelector('iframe');
      iframe.addEventListener('load', function() {
        // แจ้ง Google Apps Script ว่ากำลังรันใน embedded mode
        iframe.contentWindow.postMessage({
          type: 'embedded',
          source: 'github-pages',
          viewport: {
            width: window.innerWidth,
            height: window.innerHeight
          }
        }, 'https://script.google.com');
      });
    });
  </script>
</body>
</html>
