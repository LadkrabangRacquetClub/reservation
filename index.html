<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบจองสนามกีฬา</title>
    <base target="_top">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f5f5f5;
        }
        
        .iframe-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            background: #fff;
        }
        
        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        
        /* Loading indicator */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-family: 'Kanit', Arial, sans-serif;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Responsive adjustments */
        @media screen and (max-width: 768px) {
            .iframe-container {
                height: 100vh;
                height: -webkit-fill-available; /* สำหรับ Safari mobile */
            }
        }
        
        /* สำหรับ iOS Safari */
        @supports (-webkit-touch-callout: none) {
            .iframe-container {
                height: -webkit-fill-available;
            }
        }
    </style>
</head>
<body>
    <!-- Loading indicator -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div>กำลังโหลด...</div>
    </div>
    
    <!-- Main iframe container -->
    <div class="iframe-container">
        <iframe 
            id="mainFrame"
            src="https://script.google.com/macros/s/AKfycbyo5WRy7iyJi6kThj5z_m3XyzO6yDZ4hhtH5Tsutwz6m99-pY-wY3BVcF_vSrFjT1hq/exec"
            onload="hideLoading()"
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation">
        </iframe>
    </div>

    <script>
        function hideLoading() {
            const loading = document.getElementById('loading');
            if (loading) {
                loading.style.opacity = '0';
                setTimeout(() => {
                    loading.style.display = 'none';
                }, 300);
            }
        }
        
        // จัดการ responsive สำหรับ mobile
        function adjustIframeHeight() {
            const iframe = document.getElementById('mainFrame');
            const container = document.querySelector('.iframe-container');
            
            if (window.innerWidth <= 768) {
                const viewportHeight = window.innerHeight;
                container.style.height = `${viewportHeight}px`;
            }
        }
        
        // เรียกใช้เมื่อโหลดและเมื่อ resize
        window.addEventListener('load', adjustIframeHeight);
        window.addEventListener('resize', adjustIframeHeight);
        window.addEventListener('orientationchange', () => {
            setTimeout(adjustIframeHeight, 100);
        });
        
        // ป้องกันการ zoom ใน iOS
        document.addEventListener('touchstart', function(e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        });
        
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(e) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
    </script>
</body>
</html>
