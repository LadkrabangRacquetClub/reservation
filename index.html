<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <title>จองสนาม - Mobile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#4CAF50" />
  
  <style>
    /* รีเซ็ตทุกอย่าง */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f8f9fa;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      font-size: 14px; /* ลดขนาดฟอนต์ base */
    }
    
    /* Container เต็มจอไม่มี header */
    .mobile-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh; /* สำหรับมือถือใหม่ */
      background: white;
      overflow: hidden;
    }
    
    /* iframe เต็มพื้นที่ */
    .iframe-wrapper {
      width: 100%;
      height: 100%;
      position: relative;
    }
    
    .iframe-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: white;
      /* บังคับให้ใช้ขนาดเล็ก */
      transform: scale(0.85);
      transform-origin: 0 0;
      width: 117.6%; /* 100% / 0.85 */
      height: 117.6%; /* 100% / 0.85 */
    }
    
    /* Loading แบบเล็ก */
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #666;
      font-size: 12px;
      z-index: 10;
      text-align: center;
    }
    
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #4CAF50;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 8px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* ปรับ safe area สำหรับ iPhone */
    @supports(padding: max(0px)) {
      .mobile-container {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    }
    
    /* ปรับแต่งสำหรับหน้าจอเล็กมาก */
    @media (max-width: 360px) {
      .iframe-wrapper iframe {
        transform: scale(0.8);
        width: 125%; /* 100% / 0.8 */
        height: 125%; /* 100% / 0.8 */
      }
    }
    
    /* ปรับแต่งสำหรับหน้าจอใหญ่ */
    @media (min-width: 400px) {
      .iframe-wrapper iframe {
        transform: scale(0.9);
        width: 111.1%; /* 100% / 0.9 */
        height: 111.1%; /* 100% / 0.9 */
      }
    }
    
    /* ปรับแต่งสำหรับแนวนอน */
    @media (orientation: landscape) {
      .iframe-wrapper iframe {
        transform: scale(0.75);
        width: 133.3%; /* 100% / 0.75 */
        height: 133.3%; /* 100% / 0.75 */
      }
    }
    
    /* ปรับแต่งสำหรับหน้าจอสูง */
    @media (min-height: 800px) {
      .iframe-wrapper iframe {
        transform: scale(0.9);
        width: 111.1%;
        height: 111.1%;
      }
    }
  </style>
</head>
<body>
  <div class="mobile-container">
    <div class="iframe-wrapper">
      <div class="loading" id="loading">
        <div class="spinner"></div>
        โหลด...
      </div>
      
      <iframe
        id="mainFrame"
        src="https://script.google.com/macros/s/AKfycbxETsJxIbaYYlilT33fKX9egNaigbe82QgziXgvf73mRIGGRPopszeA8v9CgbF4lRNcgw/exec"
        title="จองสนาม"
        allow="clipboard-write; fullscreen"
        referrerpolicy="no-referrer"
        onload="hideLoading()"
        onerror="showError()">
      </iframe>
    </div>
  </div>

  <script>
    function hideLoading() {
      const loading = document.getElementById('loading');
      if (loading) {
        loading.style.display = 'none';
      }
    }
    
    function showError() {
      const loading = document.getElementById('loading');
      if (loading) {
        loading.innerHTML = `
          <div style="text-align: center;">
            <div style="font-size: 18px; margin-bottom: 8px;">❌</div>
            <div style="font-size: 12px; margin-bottom: 8px;">โหลดไม่ได้</div>
            <button onclick="location.reload()" style="padding: 6px 12px; background: #4CAF50; color: white; border: none; border-radius: 4px; font-size: 12px;">ลองใหม่</button>
          </div>
        `;
      }
    }
    
    // จัดการการเปลี่ยนแนวหน้าจอ
    window.addEventListener('orientationchange', function() {
      setTimeout(function() {
        const iframe = document.getElementById('mainFrame');
        if (iframe) {
          iframe.style.height = '0px';
          iframe.offsetHeight;
          iframe.style.height = '117.6%';
        }
      }, 100);
    });
    
    // ป้องกัน zoom
    document.addEventListener('touchstart', function (event) {
      if (event.touches.length > 1) {
        event.preventDefault();
      }
    }, { passive: false });
    
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function (event) {
      const now = (new Date()).getTime();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, false);
    
    // ซ่อน address bar
    window.addEventListener('load', function() {
      setTimeout(function() {
        window.scrollTo(0, 1);
      }, 0);
    });
    
    // ปรับขนาดตามหน้าจอ
    function adjustScale() {
      const iframe = document.getElementById('mainFrame');
      if (!iframe) return;
      
      const width = window.innerWidth;
      const height = window.innerHeight;
      
      let scale = 0.85; // default
      
      if (width < 360) {
        scale = 0.75;
      } else if (width < 400) {
        scale = 0.8;
      } else if (width >= 400) {
        scale = 0.9;
      }
      
      // ปรับตามแนวหน้าจอ
      if (window.orientation === 90 || window.orientation === -90) {
        scale = scale * 0.85; // ลดลงอีกในแนวนอน
      }
      
      iframe.style.transform = `scale(${scale})`;
      iframe.style.width = `${100 / scale}%`;
      iframe.style.height = `${100 / scale}%`;
    }
    
    // เรียกใช้เมื่อโหลดและเปลี่ยนขนาด
    window.addEventListener('load', adjustScale);
    window.addEventListener('resize', adjustScale);
    window.addEventListener('orientationchange', function() {
      setTimeout(adjustScale, 100);
    });
  </script>
</body>
</html>
