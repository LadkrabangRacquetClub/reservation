<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบจองสนามกีฬา</title>
    <base target="_top">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Kanit', Arial, sans-serif;
        }
        
        .iframe-container {
            width: 90vw;
            height: 90vh;
            max-width: 1200px;
            max-height: 800px;
            min-width: 320px;
            min-height: 400px;
            border: 2px solid #ddd;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            background: #fff;
            overflow: hidden;
            position: relative;
        }
        
        .iframe-container iframe {
            width: 200%;  /* ทำให้ iframe ใหญ่ขึ้น 2 เท่า */
            height: 200%; /* ทำให้ iframe ใหญ่ขึ้น 2 เท่า */
            border: none;
            display: block;
            border-radius: 10px;
            transform: scale(0.5); /* ย่อลง 50% */
            transform-origin: 0 0; /* เริ่มย่อจากมุมซ้ายบน */
        }
        
        /* Loading indicator */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            font-family: 'Kanit', Arial, sans-serif;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Responsive adjustments */
        @media screen and (max-width: 1024px) {
            .iframe-container {
                width: 95vw;
                height: 85vh;
            }
            
            .iframe-container iframe {
                transform: scale(0.6); /* ย่อน้อยกว่าใน tablet */
                width: 167%; /* 100/0.6 ≈ 167% */
                height: 167%;
            }
        }
        
        @media screen and (max-width: 768px) {
            .iframe-container {
                width: 98vw;
                height: 90vh;
                margin: 10px;
            }
            
            .iframe-container iframe {
                transform: scale(0.8); /* ย่อน้อยสุดใน mobile */
                width: 125%; /* 100/0.8 = 125% */
                height: 125%;
            }
        }
        
        @media screen and (max-width: 480px) {
            .iframe-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
                border: none;
            }
            
            .iframe-container iframe {
                transform: scale(1); /* ไม่ย่อใน mobile เล็ก */
                width: 100%;
                height: 100%;
            }
        }
        
        /* Header info - ย่อขนาด */
        .header-info {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(76, 175, 80, 0.9);
            color: white;
            padding: 8px 16px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        /* Scale info indicator */
        .scale-info {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 10px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <!-- Header info - ทำให้เล็กลง -->
    <div class="header-info">
        🎾 ระบบจองสนาม
    </div>
    
    <!-- Loading indicator -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div>กำลังโหลดระบบจอง...</div>
    </div>
    
    <!-- Main iframe container -->
    <div class="iframe-container">
        <iframe 
            id="mainFrame"
            src="https://script.google.com/macros/s/AKfycbyo5WRy7iyJi6kThj5z_m3XyzO6yDZ4hhtH5Tsutwz6m99-pY-wY3BVcF_vSrFjT1hq/exec"
            onload="hideLoading()"
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation">
        </iframe>
        
        <!-- Scale indicator -->
        <div class="scale-info" id="scaleInfo">
            Scale: 50%
        </div>
    </div>

    <script>
        function hideLoading() {
            const loading = document.getElementById('loading');
            if (loading) {
                loading.style.opacity = '0';
                setTimeout(() => {
                    loading.style.display = 'none';
                }, 300);
            }
        }
        
        // อัปเดต scale indicator
        function updateScaleInfo() {
            const scaleInfo = document.getElementById('scaleInfo');
            const width = window.innerWidth;
            
            if (width <= 480) {
                scaleInfo.textContent = 'Scale: 100%';
            } else if (width <= 768) {
                scaleInfo.textContent = 'Scale: 80%';
            } else if (width <= 1024) {
                scaleInfo.textContent = 'Scale: 60%';
            } else {
                scaleInfo.textContent = 'Scale: 50%';
            }
        }
        
        // เพิ่มเอฟเฟกต์เมื่อโหลดเสร็จ
        window.addEventListener('load', () => {
            const container = document.querySelector('.iframe-container');
            container.style.opacity = '0';
            container.style.transform = 'scale(0.9)';
            container.style.transition = 'all 0.3s ease';
            
            setTimeout(() => {
                container.style.opacity = '1';
                container.style.transform = 'scale(1)';
                updateScaleInfo();
            }, 100);
        });
        
        // อัปเดต scale เมื่อ resize
        window.addEventListener('resize', updateScaleInfo);
        
        // ป้องกันการ zoom
        document.addEventListener('touchstart', function(e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        });
        
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(e) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
    </script>
</body>
</html>
